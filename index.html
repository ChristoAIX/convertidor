<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Convertidor de Divisas</title>

 <link rel="stylesheet" href="css/styles.css">
 <script type="module" src="js/lib/manejaErrores.js"></script>
</head>

<body>

<h1>Convertidor de Divisas</h1>

<div class="contenedor">

<form id="formulario">

 <div class="convertidor-box">

  <div class="campo-moneda">
   <label>Cantidad / Origen</label>
   <div class="campo-input">
    <input name="cantidad" type="number" min="0" step="any" placeholder="0" required>
    <select name="origen"></select>
   </div>
  </div>

  <div class="campo-moneda">
   <label>Destino</label>
   <div class="campo-input">
    <select name="destino"></select>
   </div>
  </div>

 </div>

 <button>Convertir</button>
</form>

<p id="resultado"></p>

<h2>Historial</h2>
<ul id="lista"></ul>

</div>
<footer>
 <p>© S.A.I.C.A 2026</p>
</footer>

<script type="module" src="js/app.js"></script>

</body>
</html>
